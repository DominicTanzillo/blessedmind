<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plant Preview — All Stages, Colors, Health</title>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #f6f7f4; color: #44403c; margin: 0; padding: 24px; }
  h1 { text-align: center; font-size: 20px; margin-bottom: 4px; }
  .sub { text-align: center; color: #a8a29e; font-size: 13px; margin-bottom: 32px; }
  h2 { font-size: 13px; color: #57534e; text-align: center; margin: 28px 0 12px; }
  table { margin: 0 auto; border-collapse: collapse; }
  th { font-size: 11px; color: #a8a29e; padding: 2px 8px 6px; font-weight: 500; }
  td { padding: 4px 6px; text-align: center; vertical-align: bottom; }
  td.label { font-size: 11px; color: #57534e; font-weight: 600; text-align: right; padding-right: 10px; }
  .large-row { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-top: 12px; }
  .large-item { text-align: center; }
  .large-item span { display: block; font-size: 11px; color: #78716c; margin-top: 4px; }

  @keyframes plantSway { 0%,100%{transform:rotate(0)} 25%{transform:rotate(1.5deg)} 75%{transform:rotate(-1.5deg)} }
  .sway { animation: plantSway 3s ease-in-out infinite; }

  @keyframes breathe { 0%,100%{transform:scale(1);opacity:.55} 40%{transform:scale(1.18);opacity:1} 60%{transform:scale(1.18);opacity:1} }
  .breathe { animation: breathe 4.8s cubic-bezier(.45,0,.55,1) infinite; }

  .plant-wilting .sway { animation-duration: 4s; }
  .plant-sick .sway { animation-duration: 6s; }
  .plant-withered .sway { animation: none; }
</style>
</head>
<body>

<h1>Plant Preview</h1>
<p class="sub">All stages, color variants, and health states</p>

<h2>Color Variants &times; Stages (Healthy)</h2>
<table id="variants"></table>

<h2>Health States &mdash; Bloom Stage</h2>
<table id="health-bloom"></table>

<h2>Health States &mdash; Tree Stage</h2>
<table id="health-tree"></table>

<h2>Large Bloom Preview</h2>
<div class="large-row" id="large"></div>

<script>
const PALETTES = [
  { name:'Sage',     stem:'#788764', leaf:'#95a383', leafLt:'#b3bda3', flower:'#e8b4a8', center:'#c97b6b', trunk:'#4a5440', cDark:'#788764', cLight:'#95a383' },
  { name:'Teal',     stem:'#4a7c6f', leaf:'#6b9e8a', leafLt:'#8ebba8', flower:'#a8d4e8', center:'#5ba3c9', trunk:'#3a5e54', cDark:'#4a7c6f', cLight:'#6b9e8a' },
  { name:'Lavender', stem:'#6b5e7a', leaf:'#8e83a3', leafLt:'#a89ebb', flower:'#d4b4e8', center:'#9b6bc9', trunk:'#524660', cDark:'#6b5e7a', cLight:'#8e83a3' },
  { name:'Golden',   stem:'#7a6b4a', leaf:'#a39566', leafLt:'#bfb183', flower:'#e8d4a8', center:'#c9a36b', trunk:'#5e5238', cDark:'#7a6b4a', cLight:'#a39566' },
  { name:'Rose',     stem:'#7a4a5e', leaf:'#a36683', leafLt:'#bb839e', flower:'#e8a8c4', center:'#c96b8e', trunk:'#5e3848', cDark:'#7a4a5e', cLight:'#a36683' },
];
const STAGES = ['Seed','Sprout','Sapling','Bloom','Tree'];
const HEALTHS = ['healthy','wilting','sick','withered'];

function filterDef(health, id) {
  if (health === 'healthy') return '';
  if (health === 'wilting') return `<filter id="${id}"><feColorMatrix type="saturate" values="0.75"/></filter>`;
  if (health === 'sick') return `<filter id="${id}"><feColorMatrix type="saturate" values="0.45"/><feColorMatrix type="matrix" values="1.1 0.1 0 0 0.05 0.05 1.05 0 0 0.03 0 0 0.85 0 0 0 0 0 1 0"/></filter>`;
  return `<filter id="${id}"><feColorMatrix type="saturate" values="0.2"/><feColorMatrix type="matrix" values="1.15 0.15 0 0 0.08 0.1 1.0 0 0 0.04 0 0 0.7 0 0 0 0 0 1 0"/></filter>`;
}

const DROOP = { healthy: 0, wilting: 3, sick: 5, withered: 8 };

function plantSVG(stage, p, size, health, variantIdx) {
  const s = size || 48;
  const h = health || 'healthy';
  const vi = variantIdx ?? 0;
  const fid = `f-${Math.random().toString(36).slice(2,8)}`;
  const hclass = h !== 'healthy' ? `plant-${h}` : '';
  const filt = h !== 'healthy' ? `filter="url(#${fid})"` : '';
  const defs = h !== 'healthy' ? `<defs>${filterDef(h,fid)}</defs>` : '';
  const soil = `<line x1="8" y1="42" x2="40" y2="42" stroke="#a8977a" stroke-width="1.5" stroke-linecap="round"/>`;
  const dir = vi % 2 === 0 ? 1 : -1;
  const deg = DROOP[h] || 0;
  const droopStyle = deg > 0 ? `style="transform:rotate(${deg*dir}deg);transform-origin:24px 42px"` : '';

  let body = '';
  if (stage === 0) {
    body = `<g class="breathe" style="transform-origin:24px 40px">
      <ellipse cx="24" cy="40" rx="3.5" ry="2.5" fill="#a8977a"/>
      <ellipse cx="24" cy="39.5" rx="2.5" ry="1.8" fill="#c4a882"/>
    </g>`;
  } else if (stage === 1) {
    body = `<g class="sway" style="transform-origin:24px 42px">
      <line x1="24" y1="42" x2="24" y2="32" stroke="${p.leaf}" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M24 35 Q20 32 19 34 Q20 36 24 35Z" fill="${p.leaf}"/>
      <path d="M24 33 Q28 30 29 32 Q28 34 24 33Z" fill="${p.leafLt}"/>
    </g>`;
  } else if (stage === 2) {
    body = `<g class="sway" style="transform-origin:24px 42px">
      <line x1="24" y1="42" x2="24" y2="24" stroke="${p.stem}" stroke-width="2" stroke-linecap="round"/>
      <path d="M24 36 Q19 33 17 35 Q19 38 24 36Z" fill="${p.leaf}"/>
      <path d="M24 36 Q29 33 31 35 Q29 38 24 36Z" fill="${p.leaf}"/>
      <path d="M24 29 Q19 26 18 28 Q20 31 24 29Z" fill="${p.stem}"/>
      <path d="M24 29 Q29 26 30 28 Q28 31 24 29Z" fill="${p.stem}"/>
    </g>`;
  } else if (stage === 3) {
    body = `<g class="sway" style="transform-origin:24px 42px">
      <line x1="24" y1="42" x2="24" y2="18" stroke="${p.trunk}" stroke-width="2" stroke-linecap="round"/>
      <path d="M24 36 Q18 33 16 35 Q18 38 24 36Z" fill="${p.leaf}"/>
      <path d="M24 36 Q30 33 32 35 Q30 38 24 36Z" fill="${p.leaf}"/>
      <path d="M24 28 Q18 25 17 27 Q19 30 24 28Z" fill="${p.stem}"/>
      <path d="M24 28 Q30 25 31 27 Q29 30 24 28Z" fill="${p.stem}"/>
      <circle cx="24" cy="16" r="2" fill="${p.flower}"/>
      <circle cx="21" cy="17.5" r="1.8" fill="${p.flower}" opacity="0.8"/>
      <circle cx="27" cy="17.5" r="1.8" fill="${p.flower}" opacity="0.8"/>
      <circle cx="22.5" cy="14.5" r="1.8" fill="${p.flower}" opacity="0.8"/>
      <circle cx="25.5" cy="14.5" r="1.8" fill="${p.flower}" opacity="0.8"/>
      <circle cx="24" cy="16" r="1.2" fill="${p.center}"/>
    </g>`;
  } else {
    body = `<g class="sway" style="transform-origin:24px 42px">
      <line x1="24" y1="42" x2="24" y2="22" stroke="${p.trunk}" stroke-width="3" stroke-linecap="round"/>
      <line x1="24" y1="30" x2="19" y2="26" stroke="${p.trunk}" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="24" y1="30" x2="29" y2="26" stroke="${p.trunk}" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="24" cy="16" r="10" fill="${p.cDark}" opacity="0.7"/>
      <circle cx="20" cy="18" r="7" fill="${p.cLight}" opacity="0.6"/>
      <circle cx="28" cy="18" r="7" fill="${p.cLight}" opacity="0.6"/>
      <circle cx="24" cy="13" r="8" fill="${p.cDark}" opacity="0.5"/>
    </g>`;
  }

  return `<svg width="${s}" height="${s}" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">${defs}${soil}<g ${filt} ${droopStyle} class="${hclass}">${body}</g></svg>`;
}

// Variants × Stages table
(function(){
  const t = document.getElementById('variants');
  let html = '<tr><th></th>';
  STAGES.forEach(s => html += `<th>${s}</th>`);
  html += '</tr>';
  PALETTES.forEach((p, vi) => {
    html += `<tr><td class="label">${p.name}</td>`;
    for (let si = 0; si < 5; si++) html += `<td>${plantSVG(si, p, 48, 'healthy', vi)}</td>`;
    html += '</tr>';
  });
  t.innerHTML = html;
})();

// Health × Variants (Bloom)
(function(){
  const t = document.getElementById('health-bloom');
  let html = '<tr><th></th>';
  HEALTHS.forEach(h => html += `<th>${h}</th>`);
  html += '</tr>';
  PALETTES.forEach((p, vi) => {
    html += `<tr><td class="label">${p.name}</td>`;
    HEALTHS.forEach(h => html += `<td>${plantSVG(3, p, 48, h, vi)}</td>`);
    html += '</tr>';
  });
  t.innerHTML = html;
})();

// Health × Variants (Tree)
(function(){
  const t = document.getElementById('health-tree');
  let html = '<tr><th></th>';
  HEALTHS.forEach(h => html += `<th>${h}</th>`);
  html += '</tr>';
  PALETTES.forEach((p, vi) => {
    html += `<tr><td class="label">${p.name}</td>`;
    HEALTHS.forEach(h => html += `<td>${plantSVG(4, p, 48, h, vi)}</td>`);
    html += '</tr>';
  });
  t.innerHTML = html;
})();

// Large bloom
(function(){
  const el = document.getElementById('large');
  PALETTES.forEach((p, vi) => {
    el.innerHTML += `<div class="large-item">${plantSVG(3, p, 120, 'healthy', vi)}<span>${p.name}</span></div>`;
  });
})();
</script>
</body>
</html>
